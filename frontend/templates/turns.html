<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <div>
      <h2 class="mb-0">Betrayal & Turn System</h2>
      <small class="text-muted">Manage face/heel turns with buildup and execution</small>
    </div>
  </div>

  <div class="card mb-3"><div class="card-body">
    <form id="turnForm" class="row g-2">
      <div class="col-md-4"><label class="form-label">Wrestler</label><select id="wrestlerId" class="form-select" required></select></div>
      <div class="col-md-3"><label class="form-label">New Alignment</label><select id="newAlignment" class="form-select"><option>Face</option><option>Heel</option><option>Tweener</option></select></div>
      <div class="col-md-3"><label class="form-label">Description</label><input id="desc" class="form-control" placeholder="Betrays partner after match"></div>
      <div class="col-md-2 d-flex align-items-end"><button class="btn btn-warning w-100">Initiate Turn</button></div>
    </form>
  </div></div>

  <div class="card"><div class="card-body">
    <h5>Turn Timeline</h5>
    <div id="turnList" class="list-group"></div>
  </div></div>
</div>

<script>
async function loadWrestlers(){
  const data = await (await fetch('/api/roster?active_only=true')).json();
  const sel = document.getElementById('wrestlerId');
  sel.innerHTML = data.wrestlers.map(w=>`<option value="${w.id}">${w.name} (${w.alignment})</option>`).join('');
}
async function loadTurns(){
  const data = await (await fetch('/api/turns')).json();
  const list = document.getElementById('turnList');
  list.innerHTML = (data.turns||[]).slice().reverse().map(t=>`<div class="list-group-item">
    <div class="d-flex justify-content-between"><strong>${t.wrestler_name}: ${t.old_alignment} → ${t.new_alignment}</strong><span class="badge bg-secondary">${t.phase}</span></div>
    <div class="small text-muted">Progress ${t.turn_progress}% ${t.feud_id ? '• linked feud '+t.feud_id : ''}</div>
    ${t.is_completed ? '' : `<button class="btn btn-sm btn-outline-danger mt-2" onclick="executeTurn('${t.id}')">Execute Turn</button>`}
  </div>`).join('') || '<div class="text-muted">No turns yet.</div>';
}
async function executeTurn(id){ await fetch(`/api/turns/${id}/execute`, {method:'POST'}); await loadWrestlers(); await loadTurns(); }
document.getElementById('turnForm').addEventListener('submit', async (e)=>{
  e.preventDefault();
  await fetch('/api/turns/initiate', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({
    wrestler_id: document.getElementById('wrestlerId').value,
    new_alignment: document.getElementById('newAlignment').value,
    description: document.getElementById('desc').value
  })});
  e.target.reset();
  await loadWrestlers(); await loadTurns();
});
loadWrestlers(); loadTurns();
</script>
